*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }
body {

/* ── Scroll animations ── */
@keyframes slideInLeft {

  to   { opacity:1; transform:translateX(0); }
}
@keyframes slideInRight {
  from { opacity:0; transform:translateX(32px); }
  to   { opacity:1; transform:translateX(0); }
}
@keyframes scaleIn {
  from { opacity:0; transform:scale(0.93); }
  to   { opacity:1; transform:scale(1); }
}
@keyframes float {
  0%,100% { transform:translateY(0px); }
  50%      { transform:translateY(-10px); }
}
@keyframes shimmer {
  0%   { background-position:200% center; }
  100% { background-position:-200% center; }
}
.anim-left  { opacity:0; transform:translateX(-28px); transition:opacity 0.7s ease, transform 0.7s ease; }
.anim-right { opacity:0; transform:translateX(28px);  transition:opacity 0.7s ease, transform 0.7s ease; }
.anim-scale { opacity:0; transform:scale(0.94);        transition:opacity 0.6s ease, transform 0.6s ease; }
.anim-left.visible, .anim-right.visible, .anim-scale.visible { opacity:1; transform:none; }
.stagger-1 { transition-delay:0.08s !important; }
.stagger-2 { transition-delay:0.16s !important; }
.stagger-3 { transition-delay:0.24s !important; }
.stagger-4 { transition-delay:0.32s !important; }
.stagger-5 { transition-delay:0.40s !important; }
.stagger-6 { transition-delay:0.48s !important; }
/* Shimmer on grad-text */
.shimmer-text {
  background: linear-gradient(90deg, var(--primary-light) 0%, var(--accent) 30%, white 50%, var(--accent) 70%, var(--primary-light) 100%);

  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;

/* Hover lift on cards */
.card { transition: all 0.3s cubic-bezier(0.34,1.1,0.64,1) !important; }

}

/* Grid bg */
.grid-bg {
  background-image:

    linear-gradient(90deg, var(--border) 1px, transparent 1px);

}

h1,h2,h3,h4 { font-family: 'Syne', sans-serif; font-weight: 700; line-height: 1.1; }

/* Gradient text */
.grad-text {
  background: linear-gradient(135deg, var(--primary-light) 0%, var(--accent) 60%, var(--primary-glow) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Badge */
.badge {
  display: inline-flex;

  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  backdrop-filter: blur(8px);
}
.badge::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse-dot 2s infinite;
}
@keyframes pulse-dot {
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:0.5;transform:scale(0.8)}
}

/* Buttons */
.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 28px;
  background: var(--primary);
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 600;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}
.btn-primary::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
  opacity: 0;
  transition: opacity 0.2s;
}
.btn-primary:hover { background: var(--primary-light); transform: translateY(-2px); box-shadow: 0 12px 32px rgba(131,27,132,0.4); }
.btn-primary:hover::after { opacity: 1; }

.btn-ghost {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 13px 28px;
  background: transparent;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 500;
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s;
}
.btn-ghost:hover { border-color: var(--primary); color: var(--primary-light); background: var(--glass-bg); }

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 32px;
  transition: all 0.3s;
}
.card:hover { border-color: var(--glass-border); background: var(--surface2); transform: translateY(-3px); box-shadow: var(--shadow); }

/* Layout */
section { padding: 96px 0; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
.section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }

/* Fade in */
.fade-up { opacity: 0; transform: translateY(28px); transition: opacity 0.7s ease, transform 0.7s ease; }
.fade-up.visible { opacity: 1; transform: translateY(0); }

/* Marquee */
@keyframes marquee { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
.marquee-track { display: flex; animation: marquee 30s linear infinite; white-space: nowrap; }
.marquee-track:hover { animation-play-state: paused; }

/* Nav */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 18px 32px;

  transition: all 0.3s;

}

}
.nav-logo {

.hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }

/* Tabs */
.tabs {
  display: flex; gap: 4px;

.tab-btn {

.stat-number {
  font-family: 'Syne', sans-serif; font-size: clamp(36px,5vw,52px); font-weight: 800; line-height: 1;

.step-num {
  width: 48px; height: 48px; border-radius: 14px;

}
.whatsapp-fab:hover {
  transform: scale(1.12) translateY(-3px);

.whatsapp-fab svg { width: 28px; height: 28px; position: relative; z-index: 1; }

.lang-select {

}
.lang-select:hover { border-color: var(--primary); }

/* Theme toggle */
.theme-toggle {
  display: flex; align-items: center; gap: 10px;

/* ── Intersection Observer hook ── */
function useReveal(threshold = 0.15) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setVisible(true); obs.disconnect(); } }, { threshold });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

/* ── Counter ── */
function Counter({ target, suffix = '' }) {
  const [count, setCount] = useState(0);
  const [ref, visible] = useReveal(0.5);
  useEffect(() => {
    if (!visible) return;
    let v = 0; const dur = 1800; const step = 16;
    const inc = target / (dur / step);
    const t = setInterval(() => { v += inc; if (v >= target) { setCount(target); clearInterval(t); } else setCount(Math.floor(v)); }, step);
    return () => clearInterval(t);
  }, [visible, target]);
  return <span ref={ref}>{count.toLocaleString()}{suffix}</span>;
}

                    onMouseEnter={e=>e.target.style.color='var(--primary-light)'}
                    onMouseLeave={e=>e.target.style.color='var(--muted2)'}>{l}</a></li>
                ))}
              </ul>
            </div>
          ))}
        </div>

        {/* Footer controls: theme + language */}
        <div style={{borderTop:'1px solid var(--border)',paddingTop:24,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:16}}>
          <div style={{fontSize:12,color:'var(--muted)'}}>{t.footerCopyright}</div>
          <div style={{display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
            {/* Language */}
            <select className="lang-select" value={lang} onChange={e => setLang(e.target.value)}>
              <option value="en">🌐 English</option>
              <option value="ar">🌐 العربية</option>
              <option value="fr">🌐 Français</option>
              <option value="es">🌐 Español</option>
              <option value="de">🌐 Deutsch</option>
              <option value="hi">🌐 हिन्दी</option>
            </select>
            {/* Theme toggle */}
            <button className="theme-toggle" onClick={() => setTheme(th => th === 'dark' ? 'light' : 'dark')}>
              {theme === 'dark' ? '☀ ' + t.lightMode : '🌙 ' + t.darkMode}
            </button>
          </div>
          <div style={{fontSize:11,color:'var(--muted)'}}>{t.footerSub}</div>
        </div>
      </div>
    </footer>
  );
}

/* ── Tweaks Panel ── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#d314d7",
  "animationsOn": true,
  "heroCopy": "Enterprises"
}/*EDITMODE-END*/;

function TweaksPanel({ open, onClose }) {
  const [accent, setAccent] = useState(TWEAK_DEFAULTS.accentColor);
  useEffect(() => {
    document.documentElement.style.setProperty('--primary', accent);
  }, [accent]);
  const save = (edits) => window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  return (
    <div style={{
      position:'fixed',bottom:24,right:24,background:'var(--surface)',
      border:'1px solid var(--border)',borderRadius:16,padding:'20px',
      zIndex:200,minWidth:240,boxShadow:'0 24px 64px rgba(0,0,0,0.5)',
      display: open ? 'block' : 'none',
      backdropFilter: 'blur(20px)',
    }}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
        <span style={{fontFamily:'Syne,sans-serif',fontWeight:700,fontSize:14}}>Tweaks</span>
        <button onClick={onClose} style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:18}}>×</button>
      </div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
        <span style={{fontSize:13,color:'var(--muted2)'}}>Brand Color</span>
        <input type="color" value={accent}
          onChange={e => { setAccent(e.target.value); save({accentColor:e.target.value}); }}
          style={{width:36,height:28,borderRadius:6,border:'1px solid var(--border)',background:'none',cursor:'pointer'}} />
      </div>
      <div style={{marginTop:12,padding:10,background:'var(--glass-bg)',borderRadius:8,fontSize:11,color:'var(--muted)'}}>SRES Solutions · AI-Native</div>
    </div>
  );
}

/* ── App ── */
let lang; // hoisted for Hero wordIdx
function App() {
  const [currentLang, setCurrentLang] = useState('en');
  lang = currentLang;
  const [theme, setTheme] = useState('dark');
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const t = LANGS[currentLang] || LANGS.en;

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  // RTL for Arabic
  useEffect(() => {
    document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
  }, [currentLang]);

  return (
    <>
      <Nav t={t} lang={currentLang} setLang={setCurrentLang} theme={theme} setTheme={setTheme} />
      <main>
        <Hero t={t} />
        <TrustedBy t={t} />
        <Story t={t} />
        <Services t={t} />
        <UseCases t={t} />
        <Impact t={t} />
        <Process t={t} />
        <Testimonials t={t} />
        <BlogPreview />
      <CTA t={t} />
      </main>
      <Footer t={t} theme={theme} setTheme={setTheme} lang={currentLang} setLang={setCurrentLang} />
      <WhatsAppFAB />
      <TweaksPanel open={tweaksOpen} onClose={() => { setTweaksOpen(false); window.parent.postMessage({type:'__edit_mode_dismissed'},'*'); }} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
